name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install mlflow sklearn pandas numpy flask
    
    - name: Run modelling
      run: |
        cd MLProject
        python modelling.py
    
    - name: Start MLflow UI
      run: |
        cd MLProject
        mlflow ui --port 5000 &
        sleep 5
    
    - name: Test MLflow
      run: |
        curl -s http://localhost:5000 > /dev/null && echo "✅ MLflow UI running" || echo "❌ MLflow UI not running"
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: model-artifacts
        path: |
          MLProject/model.pkl
          MLProject/scaler.pkl

  monitoring:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Start Prometheus
      run: |
        docker run -d --name prometheus -p 9090:9090 prom/prometheus
        sleep 5
    
    - name: Start Grafana
      run: |
        docker run -d --name grafana -p 3000:3000 \
          -e GF_SECURITY_ADMIN_PASSWORD=admin \
          grafana/grafana
        sleep 5
    
    - name: Check services
      run: |
        curl -s http://localhost:9090 > /dev/null && echo "✅ Prometheus running" || echo "❌ Prometheus not running"
        curl -s http://localhost:3000 > /dev/null && echo "✅ Grafana running" || echo "❌ Grafana not running"
    
    - name: Stop containers
      run: |
        docker stop prometheus grafana || true
        docker rm prometheus grafana || true
